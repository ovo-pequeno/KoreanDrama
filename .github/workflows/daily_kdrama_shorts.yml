name: daily-kdrama-shorts

on:
  schedule:
    # 韓国ドラマフレーズShorts（gTTS ko）。1日3本（立ち上げ期・:00回避）。
    - cron: "27 22 * * *"
    - cron: "3 6 * * *"
    - cron: "51 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-kdrama-shorts
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-noto-cjk
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>//' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>//' /etc/ImageMagick-7/policy.xml || true
      - name: Install python deps
        run: pip install -r requirements.txt
      - name: Generate and upload
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          PRIVACY: "public"
          NUM_PHRASES: "7"
        run: python generate_kdrama_shorts.py
      - name: Commit dedup log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_log_kdrama_shorts.json
          git commit -m "update dedup log [skip ci]" || echo "no changes"
          git pull --rebase origin main
          git push
